name: URV Bootstrap / Sync / Build

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream Git URL. Empty = default Universal ReVanced Manager.'
        required: false
        default: 'https://github.com/Jman-Github/universal-revanced-manager.git'
      branch_id:
        description: 'Branch, tag or commit. Empty = dev.'
        required: false
        default: 'dev'
      gradle_task:
        description: 'Gradle task to run when build is enabled.'
        required: false
        default: 'assembleDev'
      vineflower_version:
        description: 'Vineflower Maven version injected into Gradle catalog.'
        required: false
        default: '1.12.0'
      run_build:
        description: 'Run Gradle build.'
        type: boolean
        required: true
        default: true
      run_emulator_wtf:
        description: 'Run emulator.wtf tests when EW_API_TOKEN and APK/test APK exist.'
        type: boolean
        required: true
        default: false
      upload_generated_tree:
        description: 'Push modified upstream source tree to generated/<run_number>.'
        type: boolean
        required: true
        default: false

  push:
    branches: [ "main" ]
    paths:
      - 'start'
      - 'start.ps1'
      - 'init/**'
      - 'build_ok'
      - '.github/workflows/start.yml'

permissions:
  contents: write
  actions: read

concurrency:
  group: urv-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Clone, patch, build and upload
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      UPSTREAM_REPO: ${{ inputs.upstream_repo || 'https://github.com/Jman-Github/universal-revanced-manager.git' }}
      UPSTREAM_REF: ${{ inputs.branch_id || 'dev' }}
      GRADLE_TASK: ${{ inputs.gradle_task || 'assembleDev' }}
      VINEFLOWER_VERSION: ${{ inputs.vineflower_version || '1.12.0' }}
      RUN_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.run_build == false && '0' || '1' }}
      SOURCE_TAR: '0'
      SOURCE_TAR_TIMEOUT_SECONDS: '60'
      SOURCE_TAR_MAX_MB: '80'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EW_API_TOKEN: ${{ secrets.EW_API_TOKEN }}

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v5

      - name: Validate action runtimes
        shell: bash
        run: python3 init/tools/actions_runtime_patcher.py --repo . --check --report out/actions-runtime-report.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          : "${ANDROID_HOME:?ANDROID_HOME is not set on this runner}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            echo "sdkmanager not found at: $SDKMANAGER" >&2
            find "$ANDROID_HOME" -maxdepth 5 -type f -name sdkmanager -print >&2 || true
            exit 2
          fi
          find "${ANDROID_HOME}/cmdline-tools" -mindepth 1 -maxdepth 1 -type d -name 'latest-*' -exec rm -rf '{}' + || true
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;35.0.1" \
            "cmake;3.22.1" \
            "ndk;25.2.9519653"
          find "${ANDROID_HOME}/cmdline-tools" -mindepth 1 -maxdepth 1 -type d -name 'latest-*' -exec rm -rf '{}' + || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          find "${ANDROID_HOME}/cmdline-tools" -mindepth 1 -maxdepth 1 -type d -print | sort
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --list_installed | sed -n '1,140p'

      - name: Setup Python patch dependencies
        shell: bash
        run: python3 -m pip install --user 'PyYAML>=6.0,<7.0'

      - name: Run bootstrap
        shell: bash
        run: |
          chmod +x ./start
          ./start "$UPSTREAM_REPO" "$UPSTREAM_REF"

      - name: Save build_ok artifacts
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          python3 init/tools/save_artifact_from_build_ok.py \
            --repo . \
            --build-ok build_ok \
            --out-dir out/saved-artifacts \
            --manifest out/saved-artifacts/manifest.json

      - name: Locate APK
        id: apk
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find out -type f -name '*.apk' ! -name '*androidTest*' | sort | head -n 1 || true)"
          test_apk="$(find out -type f -name '*androidTest*.apk' | sort | head -n 1 || true)"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"
          echo "test_apk=$test_apk" >> "$GITHUB_OUTPUT"
          printf 'APK=%s\nTEST_APK=%s\n' "$apk" "$test_apk"

      - name: Optional emulator.wtf tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_emulator_wtf == true && env.EW_API_TOKEN != '' && steps.apk.outputs.apk != '' && steps.apk.outputs.test_apk != '' }}
        uses: emulator-wtf/actions/run-tests@v1.0.0
        with:
          api-token: ${{ env.EW_API_TOKEN }}
          app: ${{ steps.apk.outputs.apk }}
          test: ${{ steps.apk.outputs.test_apk }}
          outputs-dir: out/emulator-wtf

      - name: Upload build outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@main
        with:
          name: urv-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            out/app-build-outputs/**/*.apk
            out/root-build-outputs/**/*.apk
            out/saved-artifacts/**
            out/emulator-wtf/**
            out/logs/**
            out/stage-status/**
            out/*.json
            out/*.env
            out/*.txt
            out/*.tsv
            out/*.log
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

      - name: Optional upload modified tree to generated branch
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_generated_tree == true }}
        shell: bash
        run: |
          set -euo pipefail
          cd .work/upstream
          rm -rf .git
          git init
          git checkout -B "generated/${GITHUB_RUN_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "sync: generated URV tree ${GITHUB_RUN_NUMBER}"
          git remote add target "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force target HEAD:"generated/${GITHUB_RUN_NUMBER}"
